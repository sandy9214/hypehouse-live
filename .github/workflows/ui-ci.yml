name: ui-ci

# TypeScript frontend (Vite + React + Vitest). Runs only when ui/ changes.
# ui/ scaffold lands via a separate PR; this workflow no-ops until then thanks
# to the paths filter (no triggers fire on docs-only PRs).

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ui-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ui-ci.yml'

permissions:
  contents: read

jobs:
  build:
    name: ui build + test (ubuntu / node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: test
        run: npm test

      - name: build
        run: npm run build
