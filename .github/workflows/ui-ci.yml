name: ui-ci

# TypeScript frontend (Vite + React + Vitest).
#
# Trigger note: workflow-level `paths:` was removed (#24) so this
# workflow runs on every PR. The build job is skipped when no ui paths
# changed; the final `summary` job always reports so branch protection
# can require it.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: detect-ui-changes
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'ui/**'
              - '.github/workflows/ui-ci.yml'

  build:
    name: ui build + test (ubuntu / node 20)
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: test
        run: npm test

      - name: build
        run: npm run build

  summary:
    name: ui-ci-summary
    needs: [build]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: report
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "Upstream ui-ci job failed"
            exit 1
          fi
          echo "all upstream succeeded or skipped — ok"
