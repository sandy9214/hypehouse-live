name: copilot-ci

# Python AI co-pilot service (JSON-RPC client → engine).
# mypy starts non-blocking; promote to blocking once the codebase is
# fully type-annotated.
#
# Trigger note: workflow-level `paths:` was removed (#24) so this
# workflow runs on every PR. The test job is skipped when no copilot
# paths changed; the final `summary` job always reports so branch
# protection can require it.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: detect-copilot-changes
    runs-on: ubuntu-latest
    outputs:
      copilot: ${{ steps.filter.outputs.copilot }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            copilot:
              - 'copilot/**'
              - '.github/workflows/copilot-ci.yml'

  test:
    name: copilot lint + test (ubuntu / py3.11)
    needs: changes
    if: needs.changes.outputs.copilot == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: copilot
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: copilot/pyproject.toml

      - name: Install copilot (with test extras) + lint tooling
        # pyproject defines a `test` extra (pytest + pytest-asyncio). ruff + mypy
        # aren't declared as dev deps yet — install them inline so this workflow
        # is self-contained until a future PR adds a `dev` extra.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install ruff mypy

      - name: ruff (lint)
        run: ruff check .

      - name: mypy (non-blocking initially)
        run: mypy . || true

      - name: pytest
        run: pytest

  summary:
    name: copilot-ci-summary
    needs: [test]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: report
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "Upstream copilot-ci job failed"
            exit 1
          fi
          echo "all upstream succeeded or skipped — ok"
