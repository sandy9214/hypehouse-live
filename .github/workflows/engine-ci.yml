name: engine-ci

# Rust audio engine — sub-5ms latency, no_alloc audio thread.
# Matrix across the 3 supported desktop hosts.
#
# Trigger note: this workflow used to be `paths:`-filtered at the trigger
# level so it only ran when `engine/**` changed. That left branch
# protection unable to require any check from this workflow (the check
# never reported on PRs touching only ui/ or copilot/). Issue #24 moves
# the path filter inside the workflow: the workflow now runs on every
# PR, but the heavy matrix job is skipped when no engine paths changed,
# and a final `summary` job ALWAYS reports so branch protection can
# require it.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # rust-version in engine/Cargo.toml = 1.88 (bumped from 1.85 to unlock
  # ringbuf 0.5 / criterion 0.8 / cpal 0.17 dep upgrades — issue #26)
  RUST_TOOLCHAIN: "1.88"

jobs:
  changes:
    name: detect-engine-changes
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            engine:
              - 'engine/**'
              - '.github/workflows/engine-ci.yml'

  check:
    name: ${{ matrix.os }} / rust ${{ matrix.rust }}
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: ["1.88"]
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Install Linux audio/MIDI dev libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo build --release (ubuntu only — release-binary smoke)
        if: runner.os == 'Linux'
        run: cargo build --release

  summary:
    name: engine-ci-summary
    needs: [check]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: report
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "Upstream engine-ci job failed"
            exit 1
          fi
          echo "all upstream succeeded or skipped — ok"
