name: release

# Signed release pipeline (ADR-008).
#
# Triggers on `v*` tag pushes. Each platform job:
#   1. Imports its platform certificate from encrypted secrets.
#   2. Builds the Tauri bundle.
#   3. Signs the bundle (Tauri does most of this in-process when the
#      env vars are populated).
#   4. macOS additionally submits to Apple notarisation.
#   5. Uploads the signed bundle as a draft GitHub Release asset.
#
# CRITICAL — this workflow is a PLACEHOLDER. Until the user populates
# every secret listed in `docs/RELEASE.md`, every signing step will
# no-op gracefully (the `if:` guards check that the secret is set).
# When that happens the workflow still completes successfully but
# emits warnings + uploads *unsigned* bundles. Do NOT promote an
# unsigned draft to a public release.
#
# Manual promotion: the draft release is created with `draft: true`.
# A maintainer reviews the artifacts, runs `xcrun stapler validate`
# / `signtool verify`, then clicks "Publish release" in the GH UI.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build but do not create a GitHub Release"
        required: false
        default: "false"

permissions:
  contents: write   # needed to draft the release + upload assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  RUST_TOOLCHAIN: "1.88"

jobs:
  build:
    name: ${{ matrix.platform.label }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: macos
            os: macos-latest
            target: universal-apple-darwin
            bundle-glob: |
              tauri/target/universal-apple-darwin/release/bundle/macos/*.app
              tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - label: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle-glob: |
              tauri/target/release/bundle/appimage/*.AppImage
              tauri/target/release/bundle/deb/*.deb
          - label: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle-glob: |
              tauri/target/release/bundle/msi/*.msi
              tauri/target/release/bundle/nsis/*.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.platform.target }}
          components: rustfmt, clippy

      - name: Install Linux Tauri + audio system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            gnupg

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Tauri CLI
        run: cargo install tauri-cli@2 --locked

      # --------------------------------------------------------------
      # macOS — import Developer ID cert + prep notarisation creds
      # --------------------------------------------------------------
      - name: macOS — import Developer ID Application cert
        if: runner.os == 'macOS' && env.APPLE_DEVELOPER_ID_CERT_BASE64 != ''
        env:
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
        run: |
          # Decode the cert into a temporary keychain so it never lives
          # on the runner's default keychain.
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/hypehouse-signing.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_DEVELOPER_ID_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_PASSWORD" -A -t cert -f pkcs12 \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychain -d user | tr -d '"')
          echo "APPLE_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PWD=$KEYCHAIN_PWD" >> "$GITHUB_ENV"

      - name: macOS — warn if signing cert missing
        if: runner.os == 'macOS' && env.APPLE_DEVELOPER_ID_CERT_BASE64 == ''
        env:
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
        run: |
          echo "::warning ::APPLE_DEVELOPER_ID_CERT_BASE64 not set — building UNSIGNED macOS bundle. See docs/RELEASE.md."

      # --------------------------------------------------------------
      # Windows — import Authenticode cert
      # --------------------------------------------------------------
      - name: Windows — import Authenticode cert
        if: runner.os == 'Windows' && env.WINDOWS_CERT_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'authenticode.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          echo "WINDOWS_CERT_IMPORTED=1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Windows — warn if signing cert missing
        if: runner.os == 'Windows' && env.WINDOWS_CERT_BASE64 == ''
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        run: |
          echo "::warning ::WINDOWS_CERT_BASE64 not set — building UNSIGNED Windows bundle. See docs/RELEASE.md."

      # --------------------------------------------------------------
      # Linux — import GPG key for AppImage detach signing (deferred)
      # --------------------------------------------------------------
      - name: Linux — import GPG key (deferred placeholder)
        if: runner.os == 'Linux' && env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Actual `appimagetool --sign` invocation lands in v0.2 — see
          # ADR-008 §"Open questions".

      # --------------------------------------------------------------
      # Build engine + UI deps shared by every OS
      # --------------------------------------------------------------
      - name: Build engine (release)
        run: cargo build --release --manifest-path engine/Cargo.toml

      - name: Install UI deps
        run: npm install --prefix ui

      # --------------------------------------------------------------
      # Build Tauri bundle (signs in-process when env vars are set)
      # --------------------------------------------------------------
      - name: Build Tauri bundle (macOS universal)
        if: runner.os == 'macOS'
        env:
          # Tauri reads these when signing the .app + notarising.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
        run: |
          cargo tauri build --manifest-path tauri/Cargo.toml \
            --target ${{ matrix.platform.target }}

      - name: Build Tauri bundle (Windows / Linux)
        if: runner.os != 'macOS'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
        run: cargo tauri build --manifest-path tauri/Cargo.toml

      # --------------------------------------------------------------
      # macOS notarisation
      # --------------------------------------------------------------
      - name: macOS — notarise .dmg via notarytool
        if: runner.os == 'macOS' && env.APPLE_DEVELOPER_ID_CERT_BASE64 != ''
        env:
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -euo pipefail
          DMG_PATH=$(find tauri/target/${{ matrix.platform.target }}/release/bundle/dmg -name "*.dmg" | head -n1)
          if [[ -z "$DMG_PATH" ]]; then
            echo "::warning ::No .dmg produced — skipping notarisation"
            exit 0
          fi
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      # --------------------------------------------------------------
      # Upload artifacts
      # --------------------------------------------------------------
      - name: Upload signed bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hypehouse-desktop-${{ matrix.platform.label }}-${{ github.ref_name }}
          path: ${{ matrix.platform.bundle-glob }}
          if-no-files-found: warn

      - name: Attach to draft GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: "HypeHouse Live ${{ github.ref_name }}"
          generate_release_notes: true
          files: ${{ matrix.platform.bundle-glob }}
          fail_on_unmatched_files: false
