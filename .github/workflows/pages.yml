name: pages

# Static UI deploy to GitHub Pages.
# Builds the Vite UI in web-only mode (no Tauri) and publishes to gh-pages.
# Demo URL: https://sandy9214.github.io/hypehouse-live/

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Build (web-only mode)
        working-directory: ui
        env:
          VITE_BRIDGE_URL: ''  # demo runs without a real engine
          VITE_BRIDGE_TOKEN: 'demo-readonly'
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
